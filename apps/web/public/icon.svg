<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#7C3AED"/>
  
  <!-- Card grid: 2x2 layout with slight gap -->
  <!-- Card 1 (top-left) -->
  <rect x="60" y="60" width="180" height="180" rx="20" fill="#FFFFFF"/>
  <rect x="88" y="96" width="110" height="12" rx="6" fill="#7C3AED" opacity="0.6"/>
  <rect x="88" y="118" width="80" height="12" rx="6" fill="#7C3AED" opacity="0.35"/>
  <rect x="88" y="140" width="60" height="12" rx="6" fill="#7C3AED" opacity="0.2"/>
  
  <!-- Card 2 (top-right) -->
  <rect x="272" y="60" width="180" height="180" rx="20" fill="#FFFFFF" opacity="0.85"/>
  <rect x="300" y="96" width="100" height="12" rx="6" fill="#7C3AED" opacity="0.5"/>
  <rect x="300" y="118" width="120" height="12" rx="6" fill="#7C3AED" opacity="0.3"/>
  
  <!-- Card 3 (bottom-left) -->
  <rect x="60" y="272" width="180" height="180" rx="20" fill="#FFFFFF" opacity="0.85"/>
  <rect x="88" y="308" width="120" height="12" rx="6" fill="#7C3AED" opacity="0.5"/>
  <rect x="88" y="330" width="90" height="12" rx="6" fill="#7C3AED" opacity="0.3"/>
  <rect x="88" y="352" width="70" height="12" rx="6" fill="#7C3AED" opacity="0.2"/>
  
  <!-- Card 4 (bottom-right) -->
  <rect x="272" y="272" width="180" height="180" rx="20" fill="#FFFFFF" opacity="0.7"/>
  <rect x="300" y="308" width="90" height="12" rx="6" fill="#7C3AED" opacity="0.4"/>
  <rect x="300" y="330" width="110" height="12" rx="6" fill="#7C3AED" opacity="0.25"/>
</svg>
