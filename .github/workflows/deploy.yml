name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'services/relay/**'
      - 'deploy/**'
  workflow_dispatch: # 手動デプロイ（任意のブランチから実行可能）

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm # ARM64ネイティブランナー
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Setup Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/relay

      - name: Build relay binary
        working-directory: services/relay
        run: cargo build --release --target aarch64-unknown-linux-musl --features dynamo

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::426192960050:role/nostr-relay-github-actions-deploy
          role-session-name: github-actions-deploy
          aws-region: ap-northeast-1

      - name: Upload binary to S3
        run: |
          aws s3 cp services/relay/target/aarch64-unknown-linux-musl/release/relay \
            s3://nostr-relay-binary-426192960050/relay-v2/relay

      - name: Upload env file to S3
        run: |
          aws s3 cp deploy/relay-v2.env \
            s3://nostr-relay-binary-426192960050/relay-v2/env

      - name: SSH秘密鍵の設定
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: SSH経由でデプロイ
        run: |
          ssh -o StrictHostKeyChecking=accept-new deploy@${{ secrets.EC2_HOST }} \
            'doas /usr/local/bin/nostr-relay-deploy.sh'
