name: Frontend CI

on:
  push:
    branches: [main]
    paths: ['apps/web/**']
  pull_request:
    paths: ['apps/web/**']

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - name: 依存関係インストール
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: ビルド
        run: npm run build
