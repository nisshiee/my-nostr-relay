name: Build Test (ARM64)

on:
  workflow_dispatch:

jobs:
  build-gnu:
    name: Build (gnu)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        working-directory: services/relay
        run: cargo build --release --features dynamo

      - name: Binary info
        working-directory: services/relay
        run: |
          file target/release/relay
          ls -lh target/release/relay
          ldd target/release/relay || true

      - uses: actions/upload-artifact@v4
        with:
          name: relay-gnu
          path: services/relay/target/release/relay

  build-musl:
    name: Build (musl)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        working-directory: services/relay
        run: cargo build --release --target aarch64-unknown-linux-musl --features dynamo

      - name: Binary info
        working-directory: services/relay
        run: |
          file target/aarch64-unknown-linux-musl/release/relay
          ls -lh target/aarch64-unknown-linux-musl/release/relay
          ldd target/aarch64-unknown-linux-musl/release/relay || echo "statically linked"

      - uses: actions/upload-artifact@v4
        with:
          name: relay-musl
          path: services/relay/target/aarch64-unknown-linux-musl/release/relay
